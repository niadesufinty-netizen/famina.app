<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <!-- Gradasi Biru ke Pink Modern untuk Ikon F -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f472b6; stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Latar Belakang Lingkaran Halus -->
  <circle cx="300" cy="300" r="280" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2" />

  <!-- Grup Logo Utama -->
  <g filter="url(#shadow)">
    <!-- Huruf F (Orang Lari) dengan Gradasi -->
    <path d="
      M 240,200 
      C 270,180 340,180 380,210 
      L 360,240 
      C 320,220 280,220 265,240 
      L 245,420 
      C 240,450 220,450 210,430 
      L 230,220 Z" 
      fill="url(#brandGrad)" />
      
    <path d="M 260,300 L 370,300 C 390,300 390,330 370,330 L 255,330 Z" fill="url(#brandGrad)" />
    
    <!-- Kepala Pink -->
    <circle cx="395" cy="195" r="28" fill="#f472b6" />

    <!-- Simbol Kesehatan Pink (Hati & Detak) -->
    <g transform="translate(420, 360) scale(0.8)">
       <path d="M20,35.09C12.83,28.6 8,24.22 8,18.82C8,14.4 11.4,11 15.82,11C18.31,11 20.7,12.16 22.25,14C23.8,12.16 26.19,11 28.68,11C33.1,11 36.5,14.4 36.5,18.82C36.5,24.22 31.67,28.6 24.5,35.11L22.25,37.15L20,35.09Z" fill="#f472b6" />
       <path d="M12,22 L18,22 L21,15 L25,29 L28,22 L33,22" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>

  <!-- Nama Brand (Fami Biru, Health Pink) -->
  <text x="300" y="555" font-family="'Poppins', 'Segoe UI', sans-serif" font-size="75" font-weight="800" text-anchor="middle">
    <tspan fill="#334155">Fami</tspan><tspan fill="#f472b6">Health</tspan>
  </text>
</svg>